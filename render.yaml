services:
  - type: web
    name: Stream_V0
    env: node
    buildCommand: npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: HEADLESS
        value: true
      - key: BROWSER_TIMEOUT
        value: 45000
      - key: MAX_CONCURRENT
        value: 3
